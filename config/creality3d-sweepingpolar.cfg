[stepper_bed]
step_pin: PD7
dir_pin: !PC5
enable_pin: !PD6
microsteps: 16
gear_ratio: 18:1
#endstop_pin: ^PC2
#position_endstop: 0
#position_max: 300
#homing_speed: 50


[stepper_arm]
step_pin: PC6
dir_pin: !PC7
enable_pin: !PD6
microsteps: 16
#rotation_distance: 40
#endstop_pin: ^PC3
gear_ratio: 5:1
#position_endstop: 0
#position_min: 0
#position_max: 110
#homing_speed: 10
#homing_positive_dir: false



[stepper_z]
step_pin: PB3
dir_pin: PB2
enable_pin: !PA5
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC4
position_endstop: 0.0
position_max: 400

[extruder]
step_pin: PB1
dir_pin: !PB0
enable_pin: !PD6
microsteps: 16
rotation_distance: 33.683
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PD5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA7
control: pid
pid_Kp: 22.57
pid_Ki: 1.72
pid_Kd: 73.96
min_temp: -270
max_temp: 250

[heater_bed]
heater_pin: PD4
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA6
control: pid
pid_Kp: 426.68
pid_Ki: 78.92
pid_Kd: 576.71
min_temp: -270
max_temp: 1300

[fan]
pin: PB4

[mcu]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AK06AVKI-if00-port0


[printer]
kinematics: sweeping_polar
max_velocity: 100
max_accel: 100
max_z_velocity: 5
max_z_accel: 100
max_angular_velocity: 5
distfrombed: 235

[display]
lcd_type: st7920
cs_pin: PA3
sclk_pin: PA1
sid_pin: PC1
encoder_pins: ^PD2, ^PD3
click_pin: ^!PC0

[virtual_sdcard]
path = /home/darkmonkeyz/printer_data/gcodes
on_error_gcode = CANCEL_PRINT

[force_move]
enable_force_move: True

[homing_override]
gcode:
axes: xyz
set_position_x:0
set_position_y:0
set_position_z:0