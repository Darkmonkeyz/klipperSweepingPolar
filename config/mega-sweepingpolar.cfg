# This file contains common pin mappings for the 2017 Creality
# CR-10. To use this config, the firmware should be compiled for the
# AVR atmega1284p.

# Note, a number of Melzi boards are shipped with a bootloader that
# requires the following command to flash the board:
#  avrdude -p atmega1284p -c arduino -b 57600 -P /dev/ttyUSB0 -U out/klipper.elf.hex
# If the above command does not work and "make flash" does not work
# then one may need to flash a bootloader to the board - see the
# Klipper docs/Bootloaders.md file for more information.

# See docs/Config_Reference.md for a description of parameters.

[stepper_bed]
step_pin: PF3
dir_pin: !PF1
enable_pin: !PF5
microsteps: 32
gear_ratio: 3:1
#endstop_pin: ^PC2
#position_endstop: 0
#position_max: 300
#homing_speed: 50

[stepper_arm]
step_pin: PC6
dir_pin: PC4
enable_pin: !PA7
microsteps: 16
#rotation_distance: 40
#endstop_pin: ^PC3
gear_ratio: 50:1
#position_endstop: 0
#position_min: 0
#position_max: 110
#homing_speed: 10
#homing_positive_dir: false

[stepper_z]
step_pin: PC0
dir_pin: !PG2
enable_pin: !PC2
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC7
position_endstop: 0.0
position_max: 400

[extruder]
step_pin: PL6
dir_pin: PL4
enable_pin: !PG0
microsteps: 16
rotation_distance: 33.683
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PE4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK0
control: pid
pid_Kp: 22.57
pid_Ki: 1.72
pid_Kd: 73.96
min_temp: -270
max_temp: 250


[heater_bed]
heater_pin: PG5
sensor_type: ATC Semitec 104GT-2
sensor_pin: PK2
control: pid
pid_Kp: 426.68
pid_Ki: 78.92
pid_Kd: 576.71
min_temp: -270
max_temp: 250


[fan]
pin: PH4

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB2.0-Serial-if00-port0

[printer]
kinematics: sweeping_polar
max_velocity: 100
max_accel: 100
max_z_velocity: 5
max_z_accel: 100
max_angular_velocity: 5
distfrombed: 430

#[display]
#lcd_type: st7920
#cs_pin: PA3
#sclk_pin: PA1
#sid_pin: PC1
#encoder_pins: ^PD2, ^PD3
#click_pin: ^!PC0

[virtual_sdcard]
path = /home/darkmonkeyz/printer_data/gcodes
on_error_gcode = CANCEL_PRINT

[force_move]
enable_force_move: True

[homing_override]
gcode:
axes: xyz
set_position_x:0
set_position_y:0
set_position_z:0

[gcode_arcs]
#resolution: 1.0


