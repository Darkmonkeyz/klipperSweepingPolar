[stepper_bed]
step_pin: PC18
dir_pin: !PB5
enable_pin: !PA9
microsteps: 16
gear_ratio: 18:1
#endstop_pin: ^PC2
#position_endstop: 0
#position_max: 300
#homing_speed: 50

[tmc5160 stepper_bed]
cs_pin: PD17
spi_bus: usart1
chain_position: 1
chain_length: 6
interpolate: False
run_current: 1
sense_resistor: 0.05

[stepper_arm]
step_pin: PC16
dir_pin: !PD10
enable_pin: !PA9
microsteps: 16
#rotation_distance: 40
#endstop_pin: ^PC3
gear_ratio: 50:1
#position_endstop: 0
#position_min: 0
#position_max: 110
#homing_speed: 10
#homing_positive_dir: false

[tmc5160 stepper_arm]
cs_pin: PD17
chain_position: 2
chain_length: 6
interpolate: False
run_current: 1.0
sense_resistor: 0.05


[stepper_z]
step_pin: PC28
dir_pin: PA4
enable_pin: !PA9
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC4
position_endstop: 0.0
position_max: 400

[tmc5160 stepper_z]
cs_pin: PD17
chain_position: 3
chain_length: 6
interpolate: False
run_current: 1.0
sense_resistor: 0.05

[extruder]
step_pin: PC1
dir_pin: !PA22
enable_pin: !PA9
microsteps: 16
rotation_distance: 33.683
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA24
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC29
control: pid
pid_Kp: 22.57
pid_Ki: 1.72
pid_Kd: 73.96
min_temp: -270
max_temp: 250

[heater_bed]
heater_pin: PA7
sensor_type: Generic 3950
sensor_pin: PC15
control: pid
pid_Kp: 426.68
pid_Ki: 78.92
pid_Kd: 576.71
min_temp: -270
max_temp: 1300

[fan]
pin: PC5

[mcu]
serial: /dev/serial/by-id/usb-Klipper_same70q20b_00313853315238323031303536303530-if00



[printer]
kinematics: sweeping_polar
max_velocity: 100
max_accel: 100
max_z_velocity: 5
max_z_accel: 100
max_angular_velocity: 5
distfrombed: 235

#[display]
#lcd_type: st7920
#cs_pin: PA3
#sclk_pin: PA1
#sid_pin: PC1
#encoder_pins: ^PD2, ^PD3
#click_pin: ^!PC0

[virtual_sdcard]
path = /home/darkmonkeyz/printer_data/gcodes
on_error_gcode = CANCEL_PRINT

[force_move]
enable_force_move: True

[homing_override]
gcode:
axes: xyz
set_position_x:0
set_position_y:0
set_position_z:0